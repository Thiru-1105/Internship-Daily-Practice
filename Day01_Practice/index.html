        <h2 style="text-align: center;">Student Registration Form</h2>

        <form>
            <label>Name:</label>
            <input type="text" placeholder="Enter your name"><br><br>

            <label>Email:</label>
            <input type="email" placeholder="Enter your email"><br><br>

            <label>Password:</label>
            <input type="password" placeholder="Enter your password"><br><br>

            <label>Gender:</label>
            <input type="radio" name="gender">Male
            <input type="radio" name="gender">Female
            <br><br>

            <label>Skills</label>
            <input type="checkbox" name="skills">HTML
            <input type="checkbox" name="skills">CSS
            <input type="checkbox" name="skills">JavaScript
            <br><br>

            <label>Country</label>
            <select>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
            </select>
            <br><br>

            <label>About:</label>
            <textarea rows="5" cols="40" placeholder="Write about yourself"></textarea><br><br>

            <button type="submit">Submit</button>

        </form>

    </body>
</html>
