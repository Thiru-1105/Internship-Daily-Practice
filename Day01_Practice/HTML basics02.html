<!DOCTYPE html>
<html>
    <title>HTML basics02</title> 
    <body>
        <h1>Tables Forms Lists</h1>
        <h2>Unordered Lists</h2>
        <ul>
            <li>Thirumurugan</li>
            <li>Raja</li>
            <li>Dhaya</li>
        </ul>
        <h2>Ordered Lists</h2>
        <ol>
            <li>Heat Milk</li>
            <li>Add 100gm oats</li>
            <li>Cook for 5 minutes</li>
            <li>Servings ready</li>
        </ol>
        <h2>Tables</h2>
        <table border="1">
            <caption>Student Details</caption>
            <tr>
                <th colspan="4">Details</th>
            </tr>
            <tr>
                <td rowspan="4">1</td>
            </tr>
            <tr>
                <th>S.No</th>
                <th>Name</th>
                <th>Age</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Thirumurugan</td>
                <td>25</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Raja</td>
                <td>30</td>
            </tr>
        </table>

        <h2>Forms</h2>
        <form>
            <label>Name:</label>
            <input type="text" placeholder="Enter your name:">
            <br><br>

            <label>Choose an ipl team:</label>
            <input type="radio" name="teamname">CSK
            <input type="radio" name="teamname">RCB<br><br>

            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
            <input type="checkbox"> JavaScript<br><br>

            
        </form>
        
    </body>
</html>
